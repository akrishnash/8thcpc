<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>8th Pay Commission News | Latest Updates 2026</title>
    <meta name="description" content="Latest news and updates on 8th Pay Commission, DA hikes, fitment factor and salary revisions for central government employees." />
    <link rel="canonical" href="https://8thcpc.co.in/news.html" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <meta name="google-adsense-account" content="ca-pub-5838992192903217" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5838992192903217" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
        background: #080e1a;
        color: #e2e8f0;
        -webkit-font-smoothing: antialiased;
      }

      a { color: inherit; text-decoration: none; }

      /* ── Header ── */
      .site-header {
        background: rgba(8, 14, 26, 0.9);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid #1e293b;
        position: sticky;
        top: 0;
        z-index: 20;
      }

      .header-inner {
        max-width: 1160px;
        margin: 0 auto;
        padding: 0 1.25rem;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .logo-link {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-weight: 700;
        font-size: 0.95rem;
        color: #f1f5f9;
      }

      .logo-badge-sm {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 0.85rem;
        color: #fff;
        flex-shrink: 0;
      }

      .header-nav {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        font-size: 0.85rem;
        font-weight: 500;
        color: #94a3b8;
      }

      .header-nav a:hover { color: #f1f5f9; }

      .header-nav .active { color: #60a5fa; }

      /* ── Wrap ── */
      .wrap {
        max-width: 1160px;
        margin: 0 auto;
        padding: 2.5rem 1.25rem 4rem;
      }

      /* ── Page hero ── */
      .page-hero {
        margin-bottom: 2rem;
      }

      .page-hero h1 {
        margin: 0 0 0.4rem;
        font-size: clamp(1.6rem, 3.5vw, 2.2rem);
        font-weight: 700;
        background: linear-gradient(135deg, #f1f5f9 0%, #93c5fd 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.02em;
      }

      .page-hero .sub {
        margin: 0 0 1.5rem;
        color: #64748b;
        font-size: 0.92rem;
      }

      /* ── Controls ── */
      .controls {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.5rem 1rem;
        border-radius: 999px;
        font-size: 0.83rem;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid #1e293b;
        background: #0f172a;
        color: #e2e8f0;
        transition: background 0.12s, border-color 0.12s;
      }

      .btn:hover { background: #1e293b; border-color: #334155; }

      .btn-primary {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        border-color: transparent;
        color: #fff;
        box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
      }

      .btn-primary:hover { filter: brightness(1.08); background: linear-gradient(135deg, #2563eb, #1d4ed8); }

      /* Live dot */
      .live-dot {
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #22c55e;
        animation: pulse-dot 1.8s ease-in-out infinite;
      }

      @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.5; transform: scale(0.7); }
      }

      /* ── Filter chips ── */
      .filter-bar {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin: 1.25rem 0 0.5rem;
      }

      .chip {
        padding: 0.28rem 0.75rem;
        border-radius: 999px;
        font-size: 0.76rem;
        font-weight: 600;
        border: 1px solid #1e293b;
        background: #0f172a;
        color: #94a3b8;
        cursor: pointer;
        transition: all 0.12s;
      }

      .chip:hover, .chip.active {
        background: #1e3a5f;
        border-color: #2563eb;
        color: #93c5fd;
      }

      /* ── Status bar ── */
      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 1rem 0;
        font-size: 0.8rem;
        color: #64748b;
      }

      #newsCount { color: #93c5fd; font-weight: 600; }

      /* ── News grid ── */
      .news-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
        gap: 1.1rem;
      }

      /* ── Card ── */
      .news-card {
        background: #0d1526;
        border: 1px solid #1a2540;
        border-radius: 16px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: transform 0.18s ease-out, box-shadow 0.18s ease-out, border-color 0.18s ease-out;
        cursor: pointer;
        position: relative;
      }

      .news-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
        border-color: #2563eb55;
      }

      .news-card a.card-overlay {
        position: absolute;
        inset: 0;
        z-index: 1;
      }

      /* Thumbnail */
      .card-thumb {
        aspect-ratio: 16/9;
        overflow: hidden;
        background: #0a1220;
        flex-shrink: 0;
        position: relative;
      }

      .card-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease-out;
      }

      .news-card:hover .card-thumb img { transform: scale(1.04); }

      /* Placeholder thumb */
      .card-thumb-placeholder {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 0.4rem;
        font-size: 2rem;
      }

      .thumb-label {
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        opacity: 0.5;
      }

      /* Card body */
      .card-body {
        padding: 1rem 1.1rem 1rem;
        display: flex;
        flex-direction: column;
        flex: 1;
        gap: 0.5rem;
      }

      .card-meta-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .card-source {
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 0.18rem 0.5rem;
        border-radius: 999px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 60%;
      }

      .card-time {
        font-size: 0.7rem;
        color: #4b5563;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .card-title {
        font-size: 0.88rem;
        font-weight: 600;
        color: #e2e8f0;
        line-height: 1.45;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex: 1;
      }

      .card-arrow {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        margin-top: 0.25rem;
        opacity: 0;
        transition: opacity 0.15s;
        font-size: 0.75rem;
        color: #3b82f6;
        font-weight: 600;
        gap: 0.25rem;
        position: relative;
        z-index: 2;
      }

      .news-card:hover .card-arrow { opacity: 1; }

      /* ── Loading skeleton ── */
      .skeleton-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
        gap: 1.1rem;
      }

      .skeleton-card {
        background: #0d1526;
        border: 1px solid #1a2540;
        border-radius: 16px;
        overflow: hidden;
      }

      .skeleton-thumb {
        aspect-ratio: 16/9;
        background: linear-gradient(90deg, #111827 25%, #1a2436 50%, #111827 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }

      .skeleton-body { padding: 1rem; display: flex; flex-direction: column; gap: 0.6rem; }

      .skeleton-line {
        height: 10px;
        border-radius: 6px;
        background: linear-gradient(90deg, #111827 25%, #1a2436 50%, #111827 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }

      .skeleton-line.short { width: 45%; }
      .skeleton-line.medium { width: 75%; }

      @keyframes shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* ── Empty / error state ── */
      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 3rem 1rem;
        color: #4b5563;
      }

      .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

      .empty-state p { margin: 0 0 1rem; font-size: 0.9rem; }

      /* ── Responsive ── */
      @media (max-width: 640px) {
        .header-nav { display: none; }
        .news-grid { grid-template-columns: 1fr; }
        .skeleton-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="logo-link" href="index.html">
          <div class="logo-badge-sm">8</div>
          8th CPC Calculator
        </a>
        <nav class="header-nav">
          <a href="index.html">Calculator</a>
          <a href="index.html#faq">FAQ</a>
          <a href="news.html" class="active">News</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <div class="page-hero">
        <h1>8th Pay Commission News</h1>
        <p class="sub">Live updates on DA hikes, fitment factor and salary revisions for central government employees.</p>

        <div class="controls">
          <button class="btn btn-primary" id="refreshNews" type="button">
            <span class="live-dot"></span> Refresh News
          </button>
          <a class="btn"
            href="https://news.google.com/search?q=8th%20pay%20commission%20OR%20dearness%20allowance%20hike%20OR%20salary%20revision%20central%20government&hl=en-IN&gl=IN&ceid=IN:en"
            target="_blank" rel="noopener noreferrer">
            Open in Google News ↗
          </a>
        </div>

        <div class="filter-bar" id="filterBar">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="da">DA Hike</button>
          <button class="chip" data-filter="fitment">Fitment Factor</button>
          <button class="chip" data-filter="pension">Pension</button>
          <button class="chip" data-filter="salary">Salary Revision</button>
        </div>
      </div>

      <div class="status-bar">
        <span id="newsCount"></span>
        <span id="lastRefreshed"></span>
      </div>

      <!-- Skeleton loading state -->
      <div class="skeleton-grid" id="skeletonGrid">
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line"></div><div class="skeleton-line medium"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line"></div><div class="skeleton-line medium"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line"></div><div class="skeleton-line medium"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line"></div><div class="skeleton-line medium"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line"></div><div class="skeleton-line medium"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line"></div><div class="skeleton-line medium"></div></div></div>
      </div>

      <ul id="newsList" class="news-grid" style="list-style:none;margin:0;padding:0;display:none;"></ul>
    </main>

    <script>
      const NEWS_QUERIES = [
        "8th pay commission update India",
        "dearness allowance hike central government employees 2026",
        "salary revision central government 8th CPC fitment factor"
      ];
      const MAX_ITEMS = 24;

      const newsCount   = document.getElementById("newsCount");
      const lastRefreshed = document.getElementById("lastRefreshed");
      const newsList    = document.getElementById("newsList");
      const skeletonGrid = document.getElementById("skeletonGrid");
      const refreshBtn  = document.getElementById("refreshNews");
      const filterBar   = document.getElementById("filterBar");

      let allItems = [];
      let activeFilter = "all";

      // ── Source colour palette ──
      const SOURCE_PALETTES = {
        "economic times": { bg: "#78350f22", text: "#fb923c", border: "#78350f44" },
        "ndtv":           { bg: "#7f1d1d22", text: "#f87171", border: "#7f1d1d44" },
        "news18":         { bg: "#7f1d1d22", text: "#f87171", border: "#7f1d1d44" },
        "times of india": { bg: "#78350f22", text: "#fbbf24", border: "#78350f44" },
        "hindustan times":{ bg: "#4c1d9522", text: "#c084fc", border: "#4c1d9544" },
        "outlook":        { bg: "#4c1d9522", text: "#a78bfa", border: "#4c1d9544" },
        "goodreturns":    { bg: "#14532d22", text: "#4ade80", border: "#14532d44" },
        "livemint":       { bg: "#164e6322", text: "#22d3ee", border: "#164e6344" },
        "moneycontrol":   { bg: "#0c4a6e22", text: "#38bdf8", border: "#0c4a6e44" },
        "rediff":         { bg: "#1e3a8a22", text: "#60a5fa", border: "#1e3a8a44" },
      };

      const FALLBACK_PALETTES = [
        { bg: "#1e3a8a22", text: "#60a5fa", border: "#1e3a8a44" },
        { bg: "#4c1d9522", text: "#c084fc", border: "#4c1d9544" },
        { bg: "#14532d22", text: "#4ade80", border: "#14532d44" },
        { bg: "#78350f22", text: "#fb923c", border: "#78350f44" },
        { bg: "#164e6322", text: "#22d3ee", border: "#164e6344" },
        { bg: "#7f1d1d22", text: "#f87171", border: "#7f1d1d44" },
      ];

      const PLACEHOLDER_ICONS = ["₹", "📊", "🏛️", "📰", "💼", "📋"];

      function sourcePalette(source) {
        const s = source.toLowerCase();
        for (const [key, palette] of Object.entries(SOURCE_PALETTES)) {
          if (s.includes(key)) return palette;
        }
        let hash = 0;
        for (const c of source) hash = (hash * 31 + c.charCodeAt(0)) & 0xff;
        return FALLBACK_PALETTES[hash % FALLBACK_PALETTES.length];
      }

      function sourceDisplayName(raw) {
        // Google RSS author field often contains the publisher name
        return raw.replace(/\s*-\s*.*$/, "").trim() || "Source";
      }

      function relativeTime(dateStr) {
        if (!dateStr) return "";
        const d = new Date(dateStr);
        if (isNaN(d)) return dateStr;
        const diff = (Date.now() - d) / 1000;
        if (diff < 60)   return "Just now";
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        if (diff < 172800) return "Yesterday";
        return d.toLocaleDateString("en-IN", { day: "numeric", month: "short" });
      }

      function extractImage(item) {
        // Priority: thumbnail → enclosure → img in description → null
        if (item.thumbnail && item.thumbnail.startsWith("http")) return item.thumbnail;
        if (item.enclosure?.link?.startsWith("http")) return item.enclosure.link;
        if (item.description) {
          const m = item.description.match(/<img[^>]+src=["']([^"']+)["']/i);
          if (m && m[1].startsWith("http")) return m[1];
        }
        return null;
      }

      function itemCategory(title) {
        const t = title.toLowerCase();
        if (t.includes("dearness") || t.includes(" da ") || t.includes("da hike")) return "da";
        if (t.includes("fitment")) return "fitment";
        if (t.includes("pension")) return "pension";
        if (t.includes("salary") || t.includes("revision") || t.includes("pay hike")) return "salary";
        return "other";
      }

      function buildRssUrl(query) {
        const rss = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=en-IN&gl=IN&ceid=IN:en`;
        return `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`;
      }

      function parseItems(payload) {
        return (Array.isArray(payload?.items) ? payload.items : []).map(item => ({
          title:    item.title?.trim() || "Untitled",
          link:     item.link?.trim()  || "#",
          pubDate:  item.pubDate?.trim() || "",
          source:   item.author?.trim() || "Source",
          image:    extractImage(item),
          category: itemCategory(item.title || ""),
        }));
      }

      function dedupeAndSort(items) {
        const seen = new Set();
        return items
          .filter(item => { const k = item.title + item.link; return seen.has(k) ? false : (seen.add(k), true); })
          .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate))
          .slice(0, MAX_ITEMS);
      }

      function filterItems(items) {
        if (activeFilter === "all") return items;
        return items.filter(i => i.category === activeFilter);
      }

      function renderCards(items) {
        newsList.innerHTML = "";
        const filtered = filterItems(items);

        if (!filtered.length) {
          newsList.innerHTML = `
            <li class="empty-state">
              <div class="empty-icon">📭</div>
              <p>No articles found for this filter.</p>
              <button class="btn" onclick="setFilter('all')">Show all</button>
            </li>`;
          return;
        }

        for (const item of filtered) {
          const palette = sourcePalette(item.source);
          const displaySource = sourceDisplayName(item.source);
          const timeStr = relativeTime(item.pubDate);

          let thumbHtml;
          if (item.image) {
            thumbHtml = `<div class="card-thumb">
              <img src="${item.image}" alt="" loading="lazy" onerror="this.parentElement.replaceWith(makePlaceholder('${escHtml(displaySource)}', '${palette.bg}', '${palette.text}'))">
            </div>`;
          } else {
            const icon = PLACEHOLDER_ICONS[Math.abs(hashStr(item.source)) % PLACEHOLDER_ICONS.length];
            thumbHtml = `<div class="card-thumb">
              <div class="card-thumb-placeholder" style="background:linear-gradient(135deg,${palette.bg.replace('22','44')},${palette.bg});">
                <span>${icon}</span>
                <span class="thumb-label" style="color:${palette.text}">${escHtml(displaySource)}</span>
              </div>
            </div>`;
          }

          const safeTitle = escHtml(item.title);
          const li = document.createElement("li");
          li.className = "news-card";
          li.innerHTML = `
            <a class="card-overlay" href="${item.link}" target="_blank" rel="noopener noreferrer" aria-label="${safeTitle}"></a>
            ${thumbHtml}
            <div class="card-body">
              <div class="card-meta-top">
                <span class="card-source" style="background:${palette.bg};color:${palette.text};border:1px solid ${palette.border}">${escHtml(displaySource)}</span>
                <span class="card-time">${timeStr}</span>
              </div>
              <p class="card-title">${safeTitle}</p>
              <div class="card-arrow">Read article →</div>
            </div>`;
          newsList.appendChild(li);
        }

        newsCount.textContent = `Showing ${filtered.length} of ${items.length} articles`;
      }

      function makePlaceholder(src, bg, color) {
        const div = document.createElement("div");
        div.className = "card-thumb";
        div.innerHTML = `<div class="card-thumb-placeholder" style="background:linear-gradient(135deg,${bg},${bg.replace('22','11')});"><span>📰</span><span class="thumb-label" style="color:${color}">${escHtml(src)}</span></div>`;
        return div;
      }

      function showSkeleton() {
        skeletonGrid.style.display = "grid";
        newsList.style.display = "none";
        newsCount.textContent = "";
      }

      function hideSkeleton() {
        skeletonGrid.style.display = "none";
        newsList.style.display = "grid";
      }

      function showError() {
        hideSkeleton();
        newsList.innerHTML = `
          <li class="empty-state">
            <div class="empty-icon">📡</div>
            <p>Live feed unavailable right now.</p>
            <a class="btn btn-primary" href="https://news.google.com/search?q=8th+pay+commission&hl=en-IN&gl=IN&ceid=IN:en" target="_blank" rel="noopener noreferrer">Open Google News</a>
          </li>`;
      }

      async function loadNews() {
        showSkeleton();
        const tasks = NEWS_QUERIES.map(q =>
          fetch(buildRssUrl(q), { cache: "no-store" })
            .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(parseItems)
            .catch(() => [])
        );
        const results = await Promise.all(tasks);
        allItems = dedupeAndSort(results.flat());

        hideSkeleton();
        if (!allItems.length) { showError(); return; }

        renderCards(allItems);
        lastRefreshed.textContent = "Updated " + new Date().toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
      }

      function setFilter(filter) {
        activeFilter = filter;
        document.querySelectorAll(".chip").forEach(c => c.classList.toggle("active", c.dataset.filter === filter));
        renderCards(allItems);
      }

      filterBar.addEventListener("click", e => {
        const chip = e.target.closest(".chip");
        if (chip) setFilter(chip.dataset.filter);
      });

      refreshBtn.addEventListener("click", loadNews);

      function escHtml(s) { return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]); }
      function hashStr(s) { let h = 0; for (const c of s) h = (h * 31 + c.charCodeAt(0)) | 0; return h; }

      loadNews();
    </script>
  </body>
